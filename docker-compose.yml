version: '3.8'
services:
  db:
    image: mysql:8.0
    container_name: proxy_db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: proxy_system
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data: